spring:
  application:
    name: Config-Server

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}

  cloud:
    config:
      server:
        git:
          uri: https://github.com/Shashi-Madushan/ms-project-configs.git
          search-paths: platform,services
        native:
          search-locations:
            - classpath:/configurations
            - classpath:/configurations/platform
            - classpath:/configurations/services

server:
  port: 9000

